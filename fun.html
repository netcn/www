<body>
<div class="container">
    <header class="header">

            <div class="quiz-tab active" data-type="njjzw">💡 脑筋急转弯</div>

            <div class="quiz-tab" data-type="miyu">❓ 猜谜语</div>

        </div>

        <div class="quiz-controls">
            <div class="quiz-stats"><b id="quizTitle">脑筋急转弯</b> 第 <span id="currentNum">1</span> / <span id="totalNum">0</span> 题</div>
        </div>

        <div class="quiz-card">
            <div class="quiz-category-tag" id="categoryTag">-</div>

<script>
(function(){var h=document.documentElement,t=document.getElementById('themeToggle'),th=localStorage.getItem('theme');if(th){h.setAttribute('data-theme',th);t.textContent=th==='dark'?'☀':'☾';}else if(window.matchMedia('(prefers-color-scheme:dark)').matches){h.setAttribute('data-theme','dark');t.textContent='☀';}t.addEventListener('click',function(){var c=h.getAttribute('data-theme')||'light',n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);t.textContent=n==='dark'?'☀':'☾';});})();
</script>

<script>
// Load and capture each dataset, then initialize quiz
var allData = {};
var files = ['njjzw','zimi','miyu','iq'];
var loaded = 0;

files.forEach(function(f) {
  var s = document.createElement('script');
  s.src = f + '.js';
  s.onload = function() {
    // Capture the data that was just set
    allData[f] = window.quizData.slice();
    loaded++;
    if (loaded === files.length) {
      initQuiz();
    }
  };
  document.body.appendChild(s);
});

function initQuiz() {
  var titles = {njjzw:'脑筋急转弯',zimi:'猜字谜',miyu:'猜谜语',iq:'智力测试'};
  var currentType = 'njjzw', filtered = [], idx = 0, vis = false, hist = [];

  var tabs = document.querySelectorAll('.quiz-tab');
  var title = document.getElementById('quizTitle');
  var cn = document.getElementById('currentNum');
  var tn = document.getElementById('totalNum');
  var ct = document.getElementById('categoryTag');
  var q = document.getElementById('question');
  var a = document.getElementById('answer');
  var ba = document.getElementById('btnAnswer');
  var bn = document.getElementById('btnNext');
  var bp = document.getElementById('btnPrev');

  function shuffle(arr) {
    var r = arr.slice();
    for (var i = r.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = r[i]; r[i] = r[j]; r[j] = t;
    }
    return r;
  }

  function show(i) {
    if (!filtered.length) return;
    if (i < 0) i = filtered.length - 1;
    if (i >= filtered.length) i = 0;
    idx = i;
    var d = filtered[idx];
    ct.textContent = d.c;
    q.textContent = d.q;
    a.textContent = d.a;
    a.classList.remove('show');
    ba.textContent = '显示答案';
    ba.classList.remove('hide-answer');
    vis = false;
    cn.textContent = idx + 1;
    tn.textContent = filtered.length;
  }

  function rand() {
    if (!filtered.length) return;
    hist.push(idx);
    var n;
    do { n = Math.floor(Math.random() * filtered.length); } while (n === idx && filtered.length > 1);
    show(n);
  }

  function prev() {
    if (hist.length) show(hist.pop());
  }

  function switchType(type) {
    currentType = type;
    title.textContent = titles[type];
    tabs.forEach(function(t) { t.classList.toggle('active', t.dataset.type === type); });
    filtered = shuffle(allData[type] || []);
    hist = [];
    show(0);
  }

  // Tab switching
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      switchType(this.dataset.type);
    });
  });

  // Button handlers
  ba.addEventListener('click', function() {
    if (vis) {
      a.classList.remove('show');
      ba.textContent = '显示答案';
      ba.classList.remove('hide-answer');
      vis = false;
    } else {
      a.classList.add('show');
      ba.textContent = '隐藏答案';
      ba.classList.add('hide-answer');
      vis = true;
    }
  });
  bn.addEventListener('click', function() { hist = []; rand(); });
  bp.addEventListener('click', function() { prev(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); ba.click(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); bn.click(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); bp.click(); }
  });

  // Start with first type
  switchType('njjzw');
}
</script>
</body>
