    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "简洁导航",
      "alternateName": "Jianjie Nav",
      "url": "https://netcn.org/",
      "description": "纯净无广告上网首页，收录精选中文和英文网站，分类清晰，一键直达。",

      }

    <style>
    .categories-grid{display:flex;flex-wrap:wrap;column-gap:7px;row-gap:4px;padding:0}
    .category-section{display:inline-flex;flex-wrap:wrap;align-items:center;gap:2px;padding:4px 5px;border-radius:6px}
    .cat-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 5px;border-radius:3px;font-size:16px;color:#0d9488;cursor:pointer;user-select:none;white-space:nowrap;flex-shrink:0;font-weight:600;line-height:1.5}
    .category-section a{cursor:grab;display:inline-flex;align-items:center;gap:2px;padding:2px 5px;border-radius:3px;font-size:16px;color:var(--color-text-primary);text-decoration:none;transition:all .12s;white-space:nowrap;line-height:1.5;border:0;background:transparent}
    .category-section a:hover{color:var(--color-accent);background:var(--color-accent-bg)}
    .category-section a:active{cursor:grabbing}
    .category-section a.dragging{opacity:.4}
    .category-section a.search-dim{opacity:.2;pointer-events:none}
    .cat-tag.search-dim{opacity:.2;pointer-events:none}
    .category-section a.search-match{background:var(--color-accent);color:#fff;border-color:var(--color-accent);box-shadow:0 0 12px var(--color-accent-bg);transform:scale(1.05);position:relative;z-index:1}
    </style>
    <script async custom-element="amp-ad" src="https://cdn.ampproject.org/v0/amp-ad-0.1.js"></script>
</head>
<body>
<div class="container">
    <header class="header">
        <a href="/" class="logo"><span class="logo-jj">简洁</span><span class="logo-dh">导航</span></a>
        <div class="search-box">
            <span class="search-icon">⌕</span>
            <input type="text" id="searchInput" data-zh="搜索站点..." data-en="Search sites..." placeholder="搜索站点..." autocomplete="off">
        </div>
        <button class="lang-toggle" id="langToggle" aria-label="Switch Language">EN</button>
        <div class="header-fun">
            <a href="quiz.html" class="fun-btn" title="头脑体操">💡</a>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">☾</button>
    </header>

    <div id="categoriesGrid"><div class="loading" id="loadingMsg">加载中...</div></div>

     type="adsense"

</div>

<script src="sites.js"></script>
<script>
(function(){
var h=document.documentElement,T=document.getElementById('themeToggle'),
L=document.getElementById('langToggle'),G=document.getElementById('categoriesGrid'),
S=document.getElementById('searchInput');

var t=localStorage.getItem('theme');
if(t){h.setAttribute('data-theme',t);T.textContent=t==='dark'?'☀':'☾';}
else if(window.matchMedia('(prefers-color-scheme:dark)').matches){h.setAttribute('data-theme','dark');T.textContent='☀';}
T.addEventListener('click',function(){var c=h.getAttribute('data-theme')||'light',n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);T.textContent=n==='dark'?'☀':'☾';});

var lang=localStorage.getItem('lang')||((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en');
var cur=lang;

function setLang(l){
  document.querySelectorAll('[data-zh]').forEach(function(el){
    var v=el.getAttribute('data-'+l);if(v)el.innerHTML=v;
  });
  L.textContent=l==='zh'?'EN':'中';
  h.setAttribute('lang',l==='zh'?'zh-CN':'en');
}

var C=['#2563eb','#dc2626','#059669','#7c3aed','#d97706'];
function H(img,n,e){
  if(!img.parentNode)return;
  if(e){var s=document.createElement('span');s.style.cssText='width:15px;height:15px;font-size:15px;line-height:15px;text-align:center;display:inline-block;vertical-align:middle';s.textContent=e;img.parentNode.insertBefore(s,img);img.remove();return;}
  var c=C[Math.abs(n.charCodeAt(0)||0)%5],i=n.charAt(0).toUpperCase();
  img.src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 15 15"><rect width="15" height="15" rx="3" fill="'+c+'" opacity="0.15"/><text x="7.5" y="10.5" text-anchor="middle" font-size="10" font-weight="700" fill="'+c+'" font-family="Arial,sans-serif">'+i+'</text></svg>').replace(/%20/g,' ').replace(/'/g,'%27');
}
function M(k,n,e){
  var m=document.createElement('img');
  m.style.cssText='width:15px;height:15px;border-radius:2px;object-fit:contain;opacity:0;vertical-align:middle';
  m.alt='';m.loading='lazy';
  m.addEventListener('load',function(){this.style.opacity='1';});
  m.addEventListener('error',function(){H(this,n,e);});
  m.src='favicon/'+k+'.png';
  return m;
}

// Drag & Drop
var dragEl=null;
function initDrag(sec){
  sec.addEventListener('dragstart',function(e){
    var a=e.target.closest('a');if(!a)return;
    dragEl=a;
    a.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',a.href);
  });
  sec.addEventListener('dragend',function(e){
    var a=e.target.closest('a');if(a)a.classList.remove('dragging');
    if(dragEl)dragEl.classList.remove('dragging');
    dragEl=null;
  });
}

function favKey(url){
  var h=url.replace('https://','').replace('http://','').split('/')[0].replace(/^www\./,'').replace(/^m\./,'');
  var p=h.split('.');
  if(p.length<=2)return h;
  var l2=p.slice(-2).join('.'),l3=p.slice(-3).join('.');
  var s={'com.cn':1,'net.cn':1,'org.cn':1,'gov.cn':1,'edu.cn':1,'co.jp':1,'co.uk':1,'com.au':1,'com.br':1};
  return s[l2]?l3:l2;
}

function R(){
  var d=window.sitesData?window.sitesData[cur]:null;
  if(!d||typeof d!=='object'){
    G.innerHTML='<div style="text-align:center;padding:40px;color:var(--color-text-tertiary)">'+(cur==='zh'?'数据加载失败，请刷新页面':'Data load failed, please refresh')+'</div>';
    return;
  }
  var e=document.getElementById('loadingMsg');if(e)e.style.display='none';
  G.innerHTML='';setLang(cur);
  
  var gridContainer=document.createElement('div');gridContainer.className='categories-grid';
  var catEntries=Object.entries(d);
  var catIdx=0;
  catEntries.forEach(function(entry){
    var catName=entry[0],items=entry[1];
    if(!items||!items.length)return;
    
    var sec=document.createElement('div');sec.className='category-section';
    (function(c){var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);sec.style.background='rgba('+r+','+g+','+b+',0.04)';})(C[catIdx%5]);
    var tag=document.createElement('span');tag.className='cat-tag';
    tag.textContent=catName;
    sec.appendChild(tag);
    
    // Toggle collapse via tag click
    var collapseKey='nav_collapse_'+cur+'_'+catIdx;
    var isCollapsed=localStorage.getItem(collapseKey)==='1';
    tag.style.cursor='pointer';
    tag.addEventListener('click',function(){
      var anchors=sec.querySelectorAll('a');
      var hidden=anchors.length>0&&anchors[0].style.display==='none';
      anchors.forEach(function(a){a.style.display=hidden?'':'none';});
      localStorage.setItem(collapseKey,hidden?'0':'1');
    });
    
    // Apply saved order
    var orderKey='nav_order_'+cur+'_'+catIdx;
    var savedOrder=localStorage.getItem(orderKey);
    var orderedItems;
    if(savedOrder){
      try{
        var urlOrder=JSON.parse(savedOrder);
        var itemByUrl={};
        items.forEach(function(it){itemByUrl[it.url]=it;});
        orderedItems=[];
        urlOrder.forEach(function(url){
          if(itemByUrl[url]){orderedItems.push(itemByUrl[url]);delete itemByUrl[url];}
        });
        Object.keys(itemByUrl).forEach(function(url){orderedItems.push(itemByUrl[url]);});
      }catch(e){orderedItems=items;}
    }else{orderedItems=items;}
    
    orderedItems.forEach(function(item){
      var n=item.name,u=item.url,em=item.emoji;
      var k=favKey(u);
      var a=document.createElement('a');
      a.href=u;a.target='_blank';a.rel='noopener';
      if(isCollapsed)a.style.display='none';
      a.appendChild(M(k,n,em));
      a.appendChild(document.createTextNode(n));
      sec.appendChild(a);
    });
    
    gridContainer.appendChild(sec);
    initDrag(sec);
    catIdx++;
  });
  
  G.appendChild(gridContainer);
  gridContainer.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';});
  gridContainer.addEventListener('drop',function(e){
    e.preventDefault();
    if(!dragEl)return;
    var target=e.target.closest('a');
    if(!target||target===dragEl)return;
    if(target.parentNode!==dragEl.parentNode)return;
    var sec=dragEl.parentNode;
    sec.insertBefore(dragEl,target.nextSibling);
    var urls=[];
    sec.querySelectorAll('a').forEach(function(a){urls.push(a.href);});
    var catIdx=Array.from(G.querySelectorAll('.category-section')).indexOf(sec);
    localStorage.setItem('nav_order_'+cur+'_'+catIdx,JSON.stringify(urls));
  });
  doSearch();
}

function doSearch(){
  var q=S.value.trim().toLowerCase();
  if(!q){G.querySelectorAll('.category-section a').forEach(function(a){a.classList.remove('search-match','search-dim');});G.querySelectorAll('.cat-tag').forEach(function(t){t.classList.remove('search-dim');});return;}
  G.querySelectorAll('.category-section').forEach(function(sec){
    var tag=sec.querySelector('.cat-tag'),has=!1,catMatch=tag&&tag.textContent.toLowerCase().indexOf(q)!==-1;
    sec.querySelectorAll('a').forEach(function(a){
      if(catMatch||a.textContent.toLowerCase().indexOf(q)!==-1){a.classList.add('search-match');a.classList.remove('search-dim');has=!0;}
      else{a.classList.add('search-dim');a.classList.remove('search-match');}
    });
    tag.classList.toggle('search-dim',!has);
  });
}

L.addEventListener('click',function(){cur=cur==='zh'?'en':'zh';localStorage.setItem('lang',cur);R();});
S.addEventListener('input',doSearch);
R();
})();
</script>
</body>
</html>
